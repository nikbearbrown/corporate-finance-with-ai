<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="480" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Choosing the right discount rate for a project</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Two questions, three outcomes. Most projects belong on the *use firm WACC* branch, but only after the questions have been asked.</text>
<rect x="248" y="84" width="204" height="48" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="350" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">Project risk matches</text>
<text x="350" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">firm average?</text>
<path d="M260 132 L120 192" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="178" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">YES</text>
<rect x="40" y="192" width="200" height="48" fill="#1a1714" stroke="#1a1714"/>
<text x="140" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">Use firm WACC</text>
<text x="140" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c8c4c0" text-anchor="middle">(8.0% for Halverson)</text>
<path d="M440 132 L500 192" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="475" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">NO</text>
<rect x="408" y="192" width="240" height="48" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="528" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">Identifiable comparable</text>
<text x="528" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">firms exist?</text>
<path d="M428 240 L300 308" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="358" y="282" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">YES</text>
<rect x="200" y="308" width="200" height="64" fill="#1a1714" stroke="#1a1714"/>
<text x="300" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">Estimate project beta</text>
<text x="300" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">from comps; build</text>
<text x="300" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">project WACC</text>
<path d="M620 240 L620 308" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="640" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">NO</text>
<rect x="500" y="308" width="200" height="64" fill="#1a1714" stroke="#1a1714"/>
<text x="600" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">Apply management</text>
<text x="600" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">uplift (+200–300 bp)</text>
<text x="600" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">over firm WACC</text>
<text x="350.0" y="416" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">The default is the firm WACC. The exceptions are where the FP&amp;A team has to defend a different number.</text>
</svg>