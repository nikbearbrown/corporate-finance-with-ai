<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Three frictions that make hedging valuable</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">In a frictionless world, shareholders hedge themselves and corporate hedging is irrelevant. These frictions break that.</text>
<rect x="56" y="80" width="200" height="280" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="156" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" text-anchor="middle" letter-spacing="1">DISTRESS COSTS</text>
<line x1="76" y1="320" x2="236" y2="320" stroke="#1a1714" stroke-width="1"/>
<line x1="76" y1="320" x2="76" y2="140" stroke="#1a1714" stroke-width="1"/>
<path d="M76 320 Q160 314 180 290 Q200 240 236 140" stroke="#1a1714" stroke-width="2" fill="none"/>
<line x1="190" y1="320" x2="190" y2="140" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="3 3"/>
<text x="190" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">threshold</text>
<text x="156" y="356" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#1a1714" text-anchor="middle">Costs explode past a leverage threshold</text>
<rect x="276" y="80" width="200" height="280" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="376" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" text-anchor="middle" letter-spacing="1">TAX CONVEXITY</text>
<rect x="304" y="200" width="40" height="120" fill="#1a1714"/>
<text x="324" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">volatile</text>
<text x="324" y="354" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">tax = $24M</text>
<rect x="404" y="220" width="40" height="100" fill="#8a8480"/>
<text x="424" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">smooth</text>
<text x="424" y="354" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">tax = $20M</text>
<text x="376" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#1a1714" text-anchor="middle">Same expected income,</text>
<text x="376" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#1a1714" text-anchor="middle">higher tax under volatility</text>
<rect x="496" y="80" width="200" height="280" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="596" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" text-anchor="middle" letter-spacing="1">INVESTMENT PIPELINE</text>
<path d="M520 280 L660 280" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="540" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">capex</text>
<line x1="600" y1="240" x2="600" y2="320" stroke="#1a1714" stroke-width="2" stroke-dasharray="3 3"/>
<text x="608" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714">cash shortfall</text>
<text x="608" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714">cuts off project</text>
<text x="596" y="356" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#1a1714" text-anchor="middle">Hedging preserves the pipeline</text>
<text x="350.0" y="394" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">All three frictions create a real reason for the firm to hedge — beyond what the shareholders could replicate.</text>
</svg>